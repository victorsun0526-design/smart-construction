<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单图标测试</title>
    <!-- 测试不同的Font Awesome加载方式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }
        .test-box {
            width: 150px;
            height: 150px;
            border: 2px solid #ccc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
        }
        .test-box i {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>简单图标测试</h1>
    
    <div class="test-container">
        <div class="test-box">
            <i class="fas fa-chart-line"></i>
            <div>fas fa-chart-line</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-shield-alt"></i>
            <div>fas fa-shield-alt</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-award"></i>
            <div>fas fa-award</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-pallet"></i>
            <div>fas fa-pallet</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-users"></i>
            <div>fas fa-users</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-tools"></i>
            <div>fas fa-tools</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-industry"></i>
            <div>fas fa-industry</div>
        </div>
        
        <div class="test-box">
            <i class="fas fa-building"></i>
            <div>fas fa-building</div>
        </div>
    </div>
    
    <div id="test-result" class="test-result">
        正在测试图标显示...
    </div>
    
    <h2>测试步骤：</h2>
    <ol>
        <li>检查上面的图标是否显示</li>
        <li>如果显示方框或文字，说明Font Awesome未加载</li>
        <li>检查浏览器控制台（F12）是否有错误</li>
        <li>检查网络是否正常</li>
    </ol>
    
    <button onclick="testIcons()">运行图标测试</button>
    <button onclick="window.location.href='index.html'">返回首页</button>
    
    <script>
        function testIcons() {
            const icons = document.querySelectorAll('.test-box i');
            let allIconsVisible = true;
            let results = [];
            
            icons.forEach((icon, index) => {
                const computedStyle = window.getComputedStyle(icon, ':before');
                const content = computedStyle.content;
                const fontFamily = computedStyle.fontFamily;
                
                const isVisible = content && content !== 'none' && content !== '""' && content !== "''";
                const iconName = icon.className;
                
                results.push({
                    icon: iconName,
                    visible: isVisible,
                    content: content,
                    fontFamily: fontFamily
                });
                
                if (!isVisible) {
                    allIconsVisible = false;
                }
            });
            
            const resultDiv = document.getElementById('test-result');
            
            if (allIconsVisible) {
                resultDiv.className = 'test-result success';
                resultDiv.innerHTML = `
                    <h3>✅ 测试通过！</h3>
                    <p>所有图标正常显示。</p>
                    <p>问题可能出现在首页的CSS样式或HTML结构上。</p>
                    <p>请检查首页的图标是否被正确的容器包裹。</p>
                `;
            } else {
                resultDiv.className = 'test-result error';
                resultDiv.innerHTML = `
                    <h3>❌ 测试失败！</h3>
                    <p>部分或全部图标未显示。</p>
                    <p>可能的原因：</p>
                    <ul>
                        <li>Font Awesome CDN未加载</li>
                        <li>网络连接问题</li>
                        <li>浏览器阻止了外部资源</li>
                    </ul>
                    <p>详细结果：</p>
                    <pre>${JSON.stringify(results, null, 2)}</pre>
                `;
            }
            
            console.log('图标测试结果：', results);
        }
        
        // 页面加载后自动测试
        window.addEventListener('load', function() {
            setTimeout(testIcons, 1000);
        });
    </script>
</body>
</html>
