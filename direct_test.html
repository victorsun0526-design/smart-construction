<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直接测试</title>
</head>
<body>
    <h1>直接跳转测试</h1>
    
    <p>点击下面的按钮测试跳转：</p>
    
    <button onclick="testJump()">测试跳转到 index.html</button>
    
    <script>
        function testJump() {
            console.log('测试跳转...');
            console.log('当前URL:', window.location.href);
            console.log('目标URL: index.html');
            
            // 先设置登录状态
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', 'testuser');
            
            // 然后跳转
            window.location.href = 'index.html';
        }
        
        // 页面加载时显示当前路径
        console.log('当前页面路径:', window.location.pathname);
        console.log('当前目录:', window.location.pathname.split('/').slice(0, -1).join('/'));
    </script>
</body>
</html>
