<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧工地平台（GitHub Pages修复版）</title>
    
    <!-- 内联样式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .login-brand i {
            font-size: 2.5rem;
            color: #3498db;
            background: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-brand h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .login-features h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .login-features ul {
            list-style: none;
        }

        .login-features li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .login-features i {
            color: #27ae60;
        }

        .login-right {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #95a5a6;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group label i {
            color: #3498db;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
        }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #2980b9;
        }

        .login-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .login-divider span {
            background: white;
            padding: 0 15px;
            color: #95a5a6;
            position: relative;
            z-index: 1;
        }

        .login-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-btn.wechat:hover {
            border-color: #07c160;
            color: #07c160;
        }

        .social-btn.qq:hover {
            border-color: #12b7f5;
            color: #12b7f5;
        }

        .register-link {
            text-align: center;
            color: #555;
            margin-top: auto;
        }

        .register-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
            color: #95a5a6;
            font-size: 0.9rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .footer-links a {
            color: #95a5a6;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #3498db;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }
            
            .login-left {
                padding: 30px;
            }
            
            .login-right {
                padding: 30px;
            }
            
            .social-login {
                flex-direction: column;
            }
        }

        /* 调试信息 */
        .debug-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 9999;
        }
    </style>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="debug-info" id="debugInfo">
        登录页面修复版
    </div>

    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <i class="fas fa-hard-hat"></i>
                <h1>智慧工地平台</h1>
            </div>
            <div class="login-features">
                <h2>数字化施工管理解决方案</h2>
                <ul>
                    <li><i class="fas fa-check-circle"></i> 八大核心管理模块</li>
                    <li><i class="fas fa-check-circle"></i> 实时数据监控</li>
                    <li><i class="fas fa-check-circle"></i> AI智能预警</li>
                    <li><i class="fas fa-check-circle"></i> 移动端支持</li>
                    <li><i class="fas fa-check-circle"></i> 云端部署</li>
                </ul>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-form-container">
                <div class="login-header">
                    <h2>用户登录</h2>
                    <p>请输入您的账号信息</p>
                </div>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            用户名
                        </label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            密码
                        </label>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        登录
                    </button>
                    
                    <div class="login-divider">
                        <span>或</span>
                    </div>
                    
                    <div class="social-login">
                        <button type="button" class="social-btn wechat">
                            <i class="fab fa-weixin"></i>
                            微信登录
                        </button>
                        <button type="button" class="social-btn qq">
                            <i class="fab fa-qq"></i>
                            QQ登录
                        </button>
                    </div>
                    
                    <div class="register-link">
                        还没有账号？ <a href="register.html">立即注册</a>
                    </div>
                </form>
            </div>
            
            <div class="login-footer">
                <p>© 2026 智慧工地管理平台. 保留所有权利.</p>
                <div class="footer-links">
                    <a href="#">隐私政策</a>
                    <a href="#">服务条款</a>
                    <a href="#">帮助中心</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 简单的登录功能
        document.addEventListener('DOMContentLoaded', function() {
            console.log('登录页面修复版加载完成');
            
            const loginForm = document.getElementById('loginForm');
            const debugInfo = document.getElementById('debugInfo');
            
            // 更新调试信息
            debugInfo.innerHTML = `
                登录页面修复版<br>
                样式: 内联<br>
                表单: 可用
            `;
            
            // 表单提交
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                console.log('登录尝试:', { username, password });
                
                // 简单的验证
                if (username && password) {
                    // 模拟登录成功
                    alert('登录成功！\n用户名: ' + username + '\n\n注意：这是演示版本，实际功能需要后端支持。');
                    
                    // 在实际应用中，这里会跳转到仪表板
                    // window.location.href = 'dashboard.html';
                } else {
                    alert('请输入用户名和密码！');
                }
            });
            
            // 显示/隐藏密码
            const passwordInput = document.getElementById('password');
            const togglePassword = document.createElement('button');
            togglePassword.type = 'button';
            togglePassword.innerHTML = '<i class="fas fa-eye"></i>';
            togglePassword.style.cssText = `
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                color: #95a5a6;
                cursor: pointer;
                font-size: 1rem;
            `;
            
            const passwordGroup = passwordInput.parentElement;
            passwordGroup.style.position = 'relative';
            passwordGroup.appendChild(togglePassword);
            
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
        });
    </script>
</body>
</html>
