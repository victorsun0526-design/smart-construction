<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧工地管理平台</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <i class="fas fa-hard-hat"></i>
                <h1>智慧工地平台</h1>
            </div>
            <div class="login-features">
                <h2>数字化施工管理解决方案</h2>
                <ul>
                    <li><i class="fas fa-check-circle"></i> 八大核心管理模块</li>
                    <li><i class="fas fa-check-circle"></i> 实时数据监控</li>
                    <li><i class="fas fa-check-circle"></i> AI智能预警</li>
                    <li><i class="fas fa-check-circle"></i> 移动端支持</li>
                    <li><i class="fas fa-check-circle"></i> 云端部署</li>
                </ul>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-form-container">
                <div class="login-header">
                    <h2>用户登录</h2>
                    <p>请输入您的账号信息</p>
                </div>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            用户名
                        </label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            密码
                        </label>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        登录
                    </button>
                    
                    <div class="login-divider">
                        <span>或</span>
                    </div>
                    
                    <div class="social-login">
                        <button type="button" class="social-btn wechat">
                            <i class="fab fa-weixin"></i>
                            微信登录
                        </button>
                        <button type="button" class="social-btn qq">
                            <i class="fab fa-qq"></i>
                            QQ登录
                        </button>
                    </div>
                    
                    <div class="register-link">
                        还没有账号？ <a href="register.html">立即注册</a>
                    </div>
                </form>
            </div>
            
            <div class="login-footer">
                <p>© 2026 智慧工地管理平台. 保留所有权利.</p>
                <div class="footer-links">
                    <a href="#">隐私政策</a>
                    <a href="#">服务条款</a>
                    <a href="#">帮助中心</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 添加调试信息
        console.log('login.html 加载完成');
        console.log('当前路径:', window.location.pathname);
        console.log('LocalStorage状态:', {
            isLoggedIn: localStorage.getItem('isLoggedIn'),
            username: localStorage.getItem('username')
        });
    </script>
    <script src="js/login.js"></script>
</body>
</html>
